name: Web CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  web:
    name: Web Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for Web changes
        id: changes
        run: |
          git diff --name-only origin/main...HEAD | grep '^web/' && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        if: steps.changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.changed == 'true'
        run: npm ci

      - name: Run ESLint
        if: steps.changes.outputs.changed == 'true'
        run: npm run lint

      - name: TypeScript check
        if: steps.changes.outputs.changed == 'true'
        run: npx tsc --noEmit

      - name: Build
        if: steps.changes.outputs.changed == 'true'
        run: npm run build
        env:
          VITE_MAPTILER_KEY: ${{ secrets.VITE_MAPTILER_KEY }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
